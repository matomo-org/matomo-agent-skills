interface:
  display_name: "Matomo CSS Development Rules"
  short_description: "Apply Matomo BEM CSS/Less conventions for Vue component styling"
  default_prompt: "Use $matomo-css-development-rules to author or review Matomo component styles. Put the .less/.css file next to its Vue component with no <style> block in the SFC, style with camelCase component-prefixed classes following BEM, and namespace with mtm-/u-/app- prefixes. Keep selectors to at most two classes via the descendant combinator — no tag/id/attribute selectors, no structural pseudo-classes, and no !important outside util classes. Style dark mode with the .inDarkMode(...) Morpheus mixin, use keyword flex values and safe center, write desktop-first max-width media queries in multiples of 40, and escape Less calc() as ~\"calc(...)\"."
