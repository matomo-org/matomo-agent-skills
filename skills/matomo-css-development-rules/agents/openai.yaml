interface:
  display_name: "Matomo CSS Development Rules"
  short_description: "Apply Matomo BEM CSS/Less conventions for Vue component styling"
  default_prompt: "Use $matomo-css-development-rules when authoring or reviewing Matomo component styles — a .less/.css file beside a Vue SFC, class names in a .vue template, or whether an SFC may contain a <style> block. It defines a BEM convention for predictability, isolation, and reusability: styles live in a sibling file (no SFC <style> block); classes only, camelCase and component-prefixed, with mtm-/u-/app- namespaces and nest elements for nested blocks; low-specificity selectors (at most two classes via the descendant combinator, no tag/id/attribute selectors, no structural pseudo-classes, !important only in util classes); guarded overrides of external/legacy DOM; util classes; dark mode via the .inDarkMode() mixin; flexbox; desktop-first media queries; and Less pitfalls."
