interface:
  display_name: "Matomo CSS Development Rules"
  short_description: "Apply Matomo BEM CSS/Less conventions for Vue component styling"
  default_prompt: "Use $matomo-css-development-rules to author or review Matomo component styles: place the .less/.css file next to its Vue component with the same basename, never put a <style> block in the .vue SFC — neither <style> nor <style scoped> (styles live only in the sibling .less/.css file; isolation comes from naming, keeping class names predictable and letting plugins override styles), style with camelCase component-prefixed classes only, follow BEM naming (bare block root, block--modifier, block__element, block__element--modifier, and block-prefixed @keyframes like block__animationName), wrap child blocks alone in a dedicated nest element instead of putting the nest class on the child block root or making it a sibling of a parent element, name modifiers after appearance/intention (--primary) not context or data (--card, --product), reserve a single dash only for namespacing prefixes (mtm- for generic/conflicting blocks, u- for util classes, app- for html/body app state classes), keep selectors to at most two classes using the descendant combinator with no chained classes, avoid tag/id/attribute and structural pseudo-class selectors (only :has(:focus)/:has(:focus-visible) allowed, and body/html allowed for app- state classes), keep util classes u-prefixed self-describing single-class with !important (which is allowed only in util classes, never elsewhere), write desktop-first media queries with @media (max-width: ...) only, using sizes in multiples of 40 (no min-width/min-height, no min-width range queries; @media (max-height: ...) forbidden until evidence it is needed), and escape Less calc() as ~\"calc(...)\" with underscore-prefixed block-scoped variables."
