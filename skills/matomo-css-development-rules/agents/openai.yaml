interface:
  display_name: "Matomo CSS Development Rules"
  short_description: "Apply Matomo BEM CSS/Less conventions for Vue component styling"
  default_prompt: "Use $matomo-css-development-rules to author or review Matomo component styles. Put the .less/.css file next to its Vue component with no <style> block in the SFC, style with camelCase component-prefixed classes following BEM, namespace with mtm-/u-/app- prefixes, and avoid two class names that differ by a single character (e.g. singular/plural pairs like __action/__actions). Keep selectors to at most two classes via the descendant combinator only (no >, +, or ~ combinators, which couple styling to DOM structure — use a modifier instead) — no tag/id/attribute selectors, no structural pseudo-classes, and no !important outside util classes. To style third-party DOM a component wraps, scope a commented override inside the block wrapper (narrowest selector — tag/attribute/#id allowed only as needed); for legacy/global CSS you own, resolve conflicts at the source with :where(:not(.block__element)) rather than overriding. rely on theme color tokens for per-mode colors and use the .inDarkMode(...) Morpheus mixin only for genuine light/dark design differences (not color swaps), use keyword flex values and safe center, write desktop-first max-width media queries in multiples of 40, escape Less calc() as ~\"calc(...)\", and write class names in full rather than building them with the & parent selector (e.g. .block { .block__element {} }, not &__element) so they stay greppable."
