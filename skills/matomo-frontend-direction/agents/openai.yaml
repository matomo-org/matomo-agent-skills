interface:
  display_name: "Matomo Frontend Direction"
  short_description: "Apply Matomo's jQuery-reduction, Vue-first, SPA, and Vue-test direction"
  default_prompt: "Use $matomo-frontend-direction to decide the direction of Matomo UI work, not framework mechanics. Default new UI to Vue; when touching a UI feature, extract the new or changed behavior into a Vue component instead of extending jQuery or jQuery UI; do not add new jQuery or jQuery UI usage; reduce jQuery incrementally without unrelated refactors and keep changes backward-compatible while the server-rendered model stays operational until SPA coverage is meaningful; prefer composable Vue components now and centralize routing or shared state only when there is a clear present need; and cover new or behavior-changed Vue components with focused Jest + Vue Test Utils tests of crucial behavior and meaningful edge cases. Direction findings are reported as Medium by default, not blocking. Defer Vue source, build, and sink mechanics to matomo-vue-development-rules, test commands and coverage to matomo-test-runner, and broader structure to matomo-plugin-architecture."
