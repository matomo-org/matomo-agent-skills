interface:
  display_name: "Matomo Vue Development Rules"
  short_description: "Run plugin-scoped Matomo Vue builds, enforce safe Vue patterns, and rebuild only what changed"
  default_prompt: "Use $matomo-vue-development-rules when working on Matomo Vue source changes: keep Vue code under plugins/<Plugin>/vue/src with index.ts exports, avoid cross-plugin ../vue/src imports, require every `v-html` binding to wrap content in `$sanitize(...)`, prefix numeric dynamic HTML ids with a stable string, prefer existing Vue components over jQuery UI or direct jQuery DOM work when equivalents exist, check Matomo.helper and shared Vue utilities before adding new helpers, run ddev matomo:console vue:build with explicit plugin names only (never all plugins), fix lint issues before rebuild retries, and run ddev matomo:console vue:build-polyfill when CoreVue polyfills change."
