interface:
  display_name: "Matomo Code Quality"
  short_description: "Run PHPStan/PHPCS/PHPCBF with Matomo ddev rules and baseline-aware handling"
  default_prompt: "Use $matomo-code-quality to run Matomo PHP static analysis and style checks/fixes with the correct ddev command forms. Treat narrowed-path PHPStan baseline noise carefully, confirm suspicious output with a wider plugin or core-directory run before calling it a false positive, and prefer targeted PHPCS ignores with reasons over broad suppression."
