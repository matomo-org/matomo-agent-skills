interface:
  display_name: "Matomo Code Quality"
  short_description: "Run required default PHPStan, advisory level-9 triage, and PHPCS/PHPCBF with Matomo ddev rules and baseline-aware handling"
  default_prompt: "Use $matomo-code-quality to run Matomo code quality checks with ddev: default PHPStan must pass, level-9 PHPStan is advisory on changed lines only with per-file reporting, optional BC-safe fixes are confirmation-gated, and PHPCS/PHPCBF remain available for style check/fix flows. Treat narrowed-path PHPStan baseline noise carefully, confirm suspicious output with a wider plugin or core-directory run before calling it a false positive, and prefer targeted PHPCS ignores with reasons over broad suppression."
