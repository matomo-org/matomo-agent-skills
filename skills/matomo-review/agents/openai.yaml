interface:
  display_name: "Matomo Review"
  short_description: "Review Matomo diffs with routed skill checks, findings-first output, and explicit verification reporting"
  default_prompt: "Use $matomo-review to review a Matomo branch, PR, or explicit git range against the right baseline. Run cheap repository-integrity checks, classify the changed areas, apply the relevant Matomo skills for i18n, security, API development, plugin architecture, Twig, code quality, migrations, deprecation rules, Vue, documentation, and tests, then add the relevant review dimensions for intent, correctness, maintainability, security, performance, compatibility, operability, documentation, and test quality. Treat non-additive changes to existing posted public event parameters as compatibility findings routed through $matomo-deprecation-rules and blocking by default unless the diff clearly shows intentional major-version breakage. Keep findings first, use the exact required output sections and severity buckets, and report Ran and Not run separately. For narrow in-development cleanup review of the current diff, prefer $matomo-debt-check."
