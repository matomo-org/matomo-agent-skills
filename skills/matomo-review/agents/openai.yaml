interface:
  display_name: "Matomo Review"
  short_description: "Review Matomo diffs with findings first, then problem, assessment, checks, and next steps"
  default_prompt: "Use $matomo-review to review a Matomo branch, PR, or explicit git range against the right baseline, classify the changed areas, apply the relevant Matomo review rules for i18n, code quality, migrations, Vue, and tests, and produce a review in this order: findings, problem addressed, overall assessment, Matomo-specific checks, and next steps."
