interface:
  display_name: "Matomo Review"
  short_description: "Review Matomo diffs with routed Matomo rule checks, concrete review dimensions, and synchronized skill-specific expectations"
  default_prompt: "Use $matomo-review to review a Matomo branch, PR, or explicit git range against the right baseline, run cheap repository-integrity checks, classify the changed areas, apply the relevant Matomo review rules for i18n, security, API development, Twig, code quality, migrations, Vue, documentation, and tests, then add only the relevant review dimensions for intent, correctness, maintainability, security, performance, compatibility, operability, documentation, and test quality. In correctness, explicitly check type-safety and coercion hazards. In maintainability, explicitly check dead code, local pattern drift, and accidental debug output. In performance, explicitly check Matomo anti-patterns such as database work in loops, unbounded archive invalidation, broad log-table queries, and repeated config reads in loops. In compatibility, explicitly check deprecation paths and manifest-lock sync expectations. Also keep routed checks synchronized with the underlying skills: multi-placeholder translations should use numbered placeholders, new posted events should be documented or marked @internal, migration version-sync and copy-pasteable hint expectations should be enforced, Vue reviews should catch numeric dynamic HTML ids, jQuery UI backsliding, and helper duplication, and test reviews should expect regression coverage plus non-flaky fixtures and timing. If the user is really asking for a narrow in-development debt review or cleanup-before-commit pass on the current diff, prefer $matomo-debt-check instead of forcing a full branch review. Produce the final review with these exact top-level sections in this exact order: Findings, Problem Addressed, Overall Assessment, Matomo-Specific Checks, Next Steps. Under Findings, always include the exact buckets Blocking, Medium, and Low / Polish, and write None. for any empty bucket. In Overall Assessment, include exact lines for Verdict: Yes|No|Partially and Merge readiness: Ready|Not ready. In Matomo-Specific Checks, include Applied rule sets, Applied review dimensions, Structural integrity, Ran, and Not run, with Ran and Not run kept as separate lists and every skipped relevant check explicitly listed with the reason confidence is limited."
