interface:
  display_name: "Matomo Documentation"
  short_description: "Create and update Matomo PHPDoc, including public API methods and posted events"
  default_prompt: "Use $matomo-documentation to update Matomo PHPDoc. Apply strict descriptive rules only to externally callable public methods in plugins/*/API.php, except when a method has @ignore. Methods marked @ignore should be treated under the internal minimal rules instead of the public descriptive rules. For normal public API methods, require descriptive docblocks, descriptive @param tags for every parameter, public request-facing types, and the standard shared templates. Never trust existing docblock types just because they are already present: native PHP type hints are authoritative, and otherwise the documented contract must be derived from actual code behavior, including validation, normalization, forwarding, and downstream helper contracts. If a public API method forwards a parameter unchanged to a helper with a clear accepted contract, document the public parameter to match that real contract. In particular, archive-backed public API methods that pass $idSite through to Archive::build() or Archive::createDataTableFromArchive() should document multi-site $idSite forms unless the method clearly narrows them first. Require an @return tag for every public API method, but do not add descriptive text to @return void. For posted events, require PHPDoc above new Piwik::postEvent() calls that explains purpose, parameters, pass-by-reference behavior, and a short usage example, and use @internal for internal-only events. For protected/private/internal methods, keep PHPDoc minimal: add or fix type-only @param and @return tags when native types are missing or too broad, remove redundant docblocks when native types fully cover the contract, and do not add or keep summary lines unless they convey remarkable non-obvious information. Preserve metadata tags like @ignore, @internal, @unsanitized, @deprecated, and @hide. Trust code over docs, normalize scalar aliases like boolean/integer to bool/int, and remove existing @throws tags when touching docblocks."
