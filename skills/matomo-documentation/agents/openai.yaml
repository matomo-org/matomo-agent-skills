interface:
  display_name: "Matomo Documentation"
  short_description: "Create and update Matomo PHPDoc for public APIs, internal methods, and posted events"
  default_prompt: "Use $matomo-documentation to update Matomo PHPDoc. For externally callable methods in plugins/*/API.php, require descriptive request-facing docblocks unless the method has @ignore. Document canonical public inputs rather than every parser-tolerated form. For internal methods, keep docs minimal and type-focused. Trust code over existing docs, preserve metadata tags like @ignore and @internal, normalize scalar aliases to canonical PHPDoc forms, remove touched @throws tags, and document new Piwik::postEvent() calls or mark internal-only events with @internal."
