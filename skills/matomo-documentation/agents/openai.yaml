interface:
  display_name: "Matomo Documentation"
  short_description: "Create and update Matomo PHPDoc, especially for public API methods"
  default_prompt: "Use $matomo-documentation to update Matomo PHPDoc. Apply strict descriptive rules only to externally callable public methods in plugins/*/API.php. For those public API methods, require descriptive docblocks, descriptive @param tags for every parameter, descriptive @return tags, public request-facing types, and the standard shared templates. For protected/private/internal methods, keep PHPDoc minimal: add or fix type-only @param and @return tags when native types are missing or too broad, and remove redundant docblocks when native types fully cover the contract. Trust code over docs, normalize scalar aliases like boolean/integer to bool/int, and remove existing @throws tags when touching docblocks."
