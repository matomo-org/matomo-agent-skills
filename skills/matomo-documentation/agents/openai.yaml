interface:
  display_name: "Matomo Documentation"
  short_description: "Create and update Matomo PHPDoc, especially for public API methods"
  default_prompt: "Use $matomo-documentation to update Matomo PHPDoc. Apply the stricter public-API rules only to externally callable public methods in plugins/*/API.php. Validate existing docblocks against the code instead of trusting them by default, and always fix incorrect existing docblocks, including on internal, protected, and private methods. Trust code over docs when they disagree. Normalize scalar aliases like boolean/integer to bool/int in updated docblocks. Ensure public API methods have descriptive docblocks, require @param tags with descriptions for every public API parameter, and require an @return tag with descriptive text for every public API method. For protected/private/internal methods, do not require descriptive docblocks by default, but add or fix minimal type-only @param and @return tags when native types are missing or too broad. Keep non-public @param and @return text minimal unless extra text adds non-obvious information. Remove existing @throws tags when touching method docblocks, document public API $date parameters as string, and reuse the standard $segment example text for public API methods instead of tailoring it."
