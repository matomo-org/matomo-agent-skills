interface:
  display_name: "Matomo Documentation"
  short_description: "Create and update Matomo PHPDoc, especially for public API methods"
  default_prompt: "Use $matomo-documentation to update Matomo PHPDoc. Apply strict descriptive rules only to externally callable public methods in plugins/*/API.php. For those public API methods, require descriptive docblocks, descriptive @param tags for every parameter, public request-facing types, and the standard shared templates. Require an @return tag for every public API method, but do not add descriptive text to @return void. For protected/private/internal methods, keep PHPDoc minimal: add or fix type-only @param and @return tags when native types are missing or too broad, remove redundant docblocks when native types fully cover the contract, and do not add or keep summary lines unless they convey remarkable non-obvious information. Preserve metadata tags like @ignore, @internal, @unsanitized, @deprecated, and @hide. Trust code over docs, normalize scalar aliases like boolean/integer to bool/int, and remove existing @throws tags when touching docblocks."
