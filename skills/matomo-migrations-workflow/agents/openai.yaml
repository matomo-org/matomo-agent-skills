interface:
  display_name: "Matomo Migrations Workflow"
  short_description: "Route, design, and run Matomo core/plugin migrations with strict version-sync, idempotency, and command-backed custom migration rules"
  default_prompt: "Use $matomo-migrations-workflow to create or review Matomo core/plugin update migrations: choose the correct Updates location, ensure core/Version.php or plugin version metadata is bumped in the same change so updates execute, treat update files that already exist on the tracked target dev branch as immutable history unless an allowed exception applies, avoid unneeded migrations via explicit checks, treat log-table schema changes as major updates, require every CustomMigration __toString to be an executable CLI command (create a dedicated migration command when needed), and keep admin-facing migration hints directly copy-pasteable as full CLI commands."
